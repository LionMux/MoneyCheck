version: "3.9"

services:
  # ── PostgreSQL database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: finwise_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: finwise
      POSTGRES_USER: finwise
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finwise_dev_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finwise -d finwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FinWise backend + frontend ───────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: finwise_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://finwise:${POSTGRES_PASSWORD:-finwise_dev_secret}@db:5432/finwise
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_32chars_min}
      NODE_ENV: production
      PORT: 5000
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/progress || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
