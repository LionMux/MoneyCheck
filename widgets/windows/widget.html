<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinWise Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: rgba(15, 25, 25, 0.92);
      --border: rgba(16, 185, 129, 0.25);
      --accent: #10b981;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --red: #ef4444;
    }
    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
      backdrop-filter: blur(16px);
    }
    .widget {
      padding: 14px 16px;
      height: 220px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 7px; }
    .logo svg { flex-shrink: 0; }
    .logo span { font-size: 14px; font-weight: 700; color: var(--text); }
    .actions { display: flex; gap: 4px; -webkit-app-region: no-drag; }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 3px 6px; border-radius: 6px;
      font-size: 12px; transition: color 0.15s;
    }
    .btn-icon:hover { color: var(--text); background: rgba(255,255,255,0.08); }
    .balance-section { text-align: center; }
    .balance-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .balance-value { font-size: 28px; font-weight: 800; color: var(--accent); }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat {
      background: rgba(255,255,255,0.04);
      border-radius: 10px; padding: 8px 10px;
    }
    .stat-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .stat-value { font-size: 14px; font-weight: 700; }
    .stat-value.income { color: var(--accent); }
    .stat-value.expense { color: var(--red); }
    .footer { display: flex; justify-content: space-between; align-items: center; }
    .streak { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .streak .fire { font-size: 13px; }
    .btn-open {
      background: var(--accent); color: white; border: none;
      border-radius: 8px; padding: 5px 12px; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; -webkit-app-region: no-drag;
    }
    .btn-open:hover { opacity: 0.85; }
    .error { text-align: center; color: var(--muted); font-size: 12px; padding: 20px 0; }
    .loading { text-align: center; color: var(--muted); font-size: 12px; padding: 20px 0; }
  </style>
</head>
<body>
  <div class="widget">
    <div class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#10b981"/>
          <path d="M8 22V16M12 22V12M16 22V8M20 22V14M24 22V18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span>FinWise</span>
      </div>
      <div class="actions">
        <button class="btn-icon" id="btn-refresh" title="Обновить">↻</button>
        <button class="btn-icon" id="btn-hide" title="Скрыть">✕</button>
      </div>
    </div>

    <div id="content" class="loading">Загрузка...</div>
  </div>

  <script>
    const content = document.getElementById("content");

    function formatRub(n) {
      return new Intl.NumberFormat("ru-RU", {
        style: "currency", currency: "RUB", maximumFractionDigits: 0
      }).format(n ?? 0);
    }

    function render(data) {
      content.innerHTML = `
        <div class="balance-section">
          <div class="balance-label">Общий баланс</div>
          <div class="balance-value">${formatRub(data.totalBalance)}</div>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Доходы (мес.)</div>
            <div class="stat-value income">${formatRub(data.monthIncome)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Расходы (мес.)</div>
            <div class="stat-value expense">${formatRub(data.monthExpense)}</div>
          </div>
        </div>
        <div class="footer">
          <div class="streak">
            <span class="fire">⚡</span>
            <span>${data.streak} дн. подряд · Ур. ${data.level}</span>
          </div>
          <button class="btn-open" id="btn-open">Открыть →</button>
        </div>
      `;
      document.getElementById("btn-open")?.addEventListener("click", () => {
        window.finwiseWidget.openApp();
      });
    }

    function showError(msg) {
      content.innerHTML = `<div class="error">⚠ Не удалось подключиться<br><small>${msg}</small></div>`;
    }

    window.finwiseWidget.onDataUpdate(render);
    window.finwiseWidget.onDataError(showError);

    document.getElementById("btn-refresh").addEventListener("click", () => {
      content.innerHTML = '<div class="loading">Обновляем...</div>';
      window.finwiseWidget.refresh();
    });
    document.getElementById("btn-hide").addEventListener("click", () => {
      window.finwiseWidget.hide();
    });
  </script>
</body>
</html>
