<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinWise Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: rgba(15, 25, 25, 0.92);
      --border: rgba(16, 185, 129, 0.25);
      --accent: #10b981;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --red: #ef4444;
    }
    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
      backdrop-filter: blur(16px);
    }
    .widget {
      padding: 14px 16px;
      height: 260px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .logo svg { flex-shrink: 0; }
    .logo span { font-size: 14px; font-weight: 700; color: var(--text); }
    .actions {
      display: flex;
      gap: 4px;
      -webkit-app-region: no-drag;
    }
    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 3px 6px;
      border-radius: 6px;
      font-size: 12px;
      transition: color 0.15s;
    }
    .btn-icon:hover { color: var(--text); background: rgba(255,255,255,0.08); }
    .balance-section { text-align: center; }
    .balance-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .balance-value { font-size: 28px; font-weight: 800; color: var(--accent); }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat {
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 8px 10px;
    }
    .stat-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .stat-value { font-size: 14px; font-weight: 700; }
    .stat-value.income { color: var(--accent); }
    .stat-value.expense { color: var(--red); }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .streak {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
    }
    .streak .fire { font-size: 13px; }
    .btn-open {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-app-region: no-drag;
    }
    .btn-open:hover { opacity: 0.85; }
    .error, .loading {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 20px 0;
    }
    
    /* Login screen */
    .login-screen {
      display: none;
      flex-direction: column;
      gap: 12px;
      padding: 14px 16px;
      height: 260px;
    }
    .login-screen.active { display: flex; }
    .login-title {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 11px; color: var(--muted); }
    .form-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      -webkit-app-region: no-drag;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-app-region: no-drag;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-app-region: no-drag;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--red);
      text-align: center;
    }
    
    /* Settings screen */
    .settings-screen {
      display: none;
      flex-direction: column;
      gap: 12px;
      padding: 14px 16px;
      height: 260px;
    }
    .settings-screen.active { display: flex; }
    .settings-title {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Main Widget Screen -->
<div class="widget" id="main-screen">
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      <span>FinWise</span>
    </div>
    <div class="actions">
      <button class="btn-icon" id="btn-settings" title="Настройки">⚙️</button>
      <button class="btn-icon" id="btn-refresh" title="Обновить">↻</button>
      <button class="btn-icon" id="btn-hide" title="Скрыть">✕</button>
    </div>
  </div>
  
  <div id="content">
    <div class="loading">Загрузка...</div>
  </div>
</div>

<!-- Login Screen -->
<div class="login-screen" id="login-screen">
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      <span>FinWise</span>
    </div>
    <div class="actions">
      <button class="btn-icon" id="btn-hide-login" title="Скрыть">✕</button>
    </div>
  </div>
  
  <div class="login-title">Вход в аккаунт</div>
  
  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" class="form-input" id="login-email" placeholder="your@email.com" />
  </div>
  
  <div class="form-group">
    <label class="form-label">Пароль</label>
    <input type="password" class="form-input" id="login-password" placeholder="••••••••" />
  </div>
  
  <div class="login-error hidden" id="login-error"></div>
  
  <button class="btn-primary" id="btn-login">Войти</button>
  <button class="btn-secondary" id="btn-cancel-login">Отмена</button>
</div>

<!-- Settings Screen -->
<div class="settings-screen" id="settings-screen">
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      <span>FinWise</span>
    </div>
    <div class="actions">
      <button class="btn-icon" id="btn-close-settings" title="Закрыть">✕</button>
    </div>
  </div>
  
  <div class="settings-title">Настройки</div>
  
  <div class="form-group">
    <label class="form-label">URL сервера</label>
    <input type="text" class="form-input" id="settings-url" placeholder="http://localhost:5000" />
  </div>
  
  <button class="btn-secondary" id="btn-test-connection">Проверить подключение</button>
  
  <div class="login-error hidden" id="settings-status"></div>
  
  <button class="btn-primary" id="btn-save-settings">Сохранить</button>
  <button class="btn-secondary" id="btn-logout">Выйти из аккаунта</button>
</div>
</div>

<script>
  const fw = window.finwiseWidget;

  // ── Screen switching ──────────────────────────────────────────────────────
  const mainScreen     = document.getElementById('main-screen');
  const loginScreen    = document.getElementById('login-screen');
  const settingsScreen = document.getElementById('settings-screen');

  function showScreen(name) {
    mainScreen.style.display     = name === 'main'     ? 'flex' : 'none';
    loginScreen.classList.toggle ('active', name === 'login');
    settingsScreen.classList.toggle('active', name === 'settings');
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function formatRub(n) {
    return new Intl.NumberFormat('ru-RU', {
      style: 'currency', currency: 'RUB', maximumFractionDigits: 0
    }).format(n ?? 0);
  }

  function showStatus(elId, msg, isError = true) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.textContent = msg;
    el.style.color = isError ? 'var(--red)' : 'var(--accent)';
    el.classList.remove('hidden');
  }

  // ── Render main data ──────────────────────────────────────────────────────
  function render(data) {
    const content = document.getElementById('content');
    const demoNote = data.demo
      ? '<div style="font-size:10px;color:var(--muted);text-align:center">Demo-режим</div>'
      : '';
    content.innerHTML = `
      ${demoNote}
      <div class="balance-section">
        <div class="balance-label">Общий баланс</div>
        <div class="balance-value">${formatRub(data.totalBalance)}</div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Доходы (мес.)</div>
          <div class="stat-value income">${formatRub(data.monthIncome)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Расходы (мес.)</div>
          <div class="stat-value expense">${formatRub(data.monthExpense)}</div>
        </div>
      </div>
      <div class="footer">
        <div class="streak">
          <span class="fire">⚡</span>
          <span>${data.streak} дн. подряд · Ур. ${data.level}</span>
        </div>
        <button class="btn-open" id="btn-open-app">Открыть →</button>
      </div>
    `;
    document.getElementById('btn-open-app')?.addEventListener('click', () => fw.openApp());
    showScreen('main');
  }

  function showError(msg) {
    const content = document.getElementById('content');
    const isUnavail = msg && msg.toLowerCase().includes('unavailable');
    content.innerHTML = `
      <div class="error">
        ⚠ ${isUnavail ? 'Сервер недоступен' : 'Ошибка подключения'}
        <br><small style="opacity:0.7">${msg || ''}</small>
        <br><br>
        <button class="btn-open" onclick="fw.refresh()" style="-webkit-app-region:no-drag">Повторить</button>
      </div>
    `;
    showScreen('main');
  }

  // ── Events from main process ──────────────────────────────────────────────
  fw.onDataUpdate(render);
  fw.onDataError(showError);
  fw.onShowLogin(() => showScreen('login'));

  // ── Main screen buttons ───────────────────────────────────────────────────
  document.getElementById('btn-refresh').addEventListener('click', () => {
    document.getElementById('content').innerHTML = '<div class="loading">Обновляем...</div>';
    fw.refresh();
  });

  document.getElementById('btn-hide').addEventListener('click', () => fw.hide());

  document.getElementById('btn-settings').addEventListener('click', async () => {
    const cfg = await fw.getConfig();
    document.getElementById('settings-url').value = cfg.backendUrl || 'http://localhost:5000';
    document.getElementById('settings-status').classList.add('hidden');
    showScreen('settings');
  });

  // ── Login screen ──────────────────────────────────────────────────────────
  document.getElementById('btn-hide-login').addEventListener('click', () => fw.hide());
  document.getElementById('btn-cancel-login').addEventListener('click', () => showScreen('main'));

  document.getElementById('btn-login').addEventListener('click', async () => {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('btn-login');

    if (!email || !password) {
      showStatus('login-error', 'Введите email и пароль');
      return;
    }

    btn.textContent = 'Входим...';
    btn.disabled = true;
    errEl.classList.add('hidden');

    const result = await fw.login({ email, password });
    btn.textContent = 'Войти';
    btn.disabled = false;

    if (result.ok) {
      document.getElementById('login-email').value = '';
      document.getElementById('login-password').value = '';
      document.getElementById('content').innerHTML = '<div class="loading">Загрузка...</div>';
      showScreen('main');
      fw.refresh();
    } else {
      showStatus('login-error', result.error || 'Неверный email или пароль');
    }
  });

  // Enter key in password field → submit
  document.getElementById('login-password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-login').click();
  });

  // ── Settings screen ───────────────────────────────────────────────────────
  document.getElementById('btn-close-settings').addEventListener('click', () => showScreen('main'));

  document.getElementById('btn-test-connection').addEventListener('click', async () => {
    const url    = document.getElementById('settings-url').value.trim();
    const btn    = document.getElementById('btn-test-connection');
    btn.textContent = 'Проверяем...';
    btn.disabled = true;

    const result = await fw.testConnection(url);
    btn.textContent = 'Проверить подключение';
    btn.disabled = false;

    if (result.ok) {
      const msg = result.needsLogin
        ? '✓ Сервер доступен (требуется вход)'
        : '✓ Сервер доступен и вы авторизованы';
      showStatus('settings-status', msg, false);
    } else {
      showStatus('settings-status', '✗ ' + (result.error || 'Нет соединения'), true);
    }
  });

  document.getElementById('btn-save-settings').addEventListener('click', async () => {
    const url = document.getElementById('settings-url').value.trim();
    if (!url) {
      showStatus('settings-status', 'URL не может быть пустым');
      return;
    }
    await fw.setBackendUrl(url);
    showStatus('settings-status', '✓ Сохранено', false);
    setTimeout(() => {
      showScreen('main');
      document.getElementById('content').innerHTML = '<div class="loading">Обновляем...</div>';
      fw.refresh();
    }, 800);
  });

  document.getElementById('btn-logout').addEventListener('click', async () => {
    await fw.logout();
    showStatus('settings-status', '✓ Вы вышли из аккаунта', false);
    setTimeout(() => {
      showScreen('main');
      document.getElementById('content').innerHTML = '<div class="loading">Загрузка...</div>';
      fw.refresh();
    }, 800);
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  // Показываем главный экран сразу; данные придут через IPC от main.js
  showScreen('main');
</script>
</body>
</html>
